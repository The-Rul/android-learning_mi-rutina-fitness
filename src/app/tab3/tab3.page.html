<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Configuración</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Configuración</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-text>
    <h2>Configuración</h2>
  </ion-text>

  <ion-list>
    <ion-item>
      <ion-input
        label="Nombre de usuario"
        labelPlacement="stacked"
        placeholder="Introduce tu nombre"
        type="text"
        [(ngModel)]="nombreUsuario"
        name="nombreUsuario">
      </ion-input>
    </ion-item>

    <ion-item>
      <ion-toggle justify="space-between"
                  [checked]="temaOscuro"
                  (ionChange)="cambiarTema($event)">
        Tema oscuro
      </ion-toggle>
    </ion-item>
  </ion-list>

  <ion-button expand="block" (click)="guardarConfiguracion()">
    Guardar configuración
  </ion-button>
    <ion-text color="medium" *ngIf="mensaje">
    <p>{{ mensaje }}</p>
  </ion-text>
</ion-content>
